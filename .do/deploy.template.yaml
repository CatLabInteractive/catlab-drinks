spec:
  name: catlab-drinks
  services:
    - name: web
      git:
        repo_clone_url: https://github.com/CatLabInteractive/catlab-drinks.git
        branch: main
      dockerfile_path: Dockerfile
      http_port: 80
      routes:
        - path: /
      run_command: php artisan migrate --force && apache2-foreground
      envs:
        - key: APP_KEY
          type: SECRET
          scope: RUN_TIME
          description: "Generate with: php -r \"echo 'base64:'.base64_encode(random_bytes(32));\" "
        - key: APP_ENV
          scope: RUN_TIME
          value: production
        - key: APP_DEBUG
          scope: RUN_TIME
          value: "false"
        - key: APP_URL
          scope: RUN_TIME
          value: ${APP_URL}
        - key: DATABASE_URL
          type: SECRET
          scope: RUN_TIME
