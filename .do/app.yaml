name: catlab-drinks

services:
  - name: web
    github:
      repo: CatLabInteractive/catlab-drinks
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: php artisan migrate --force && apache2-foreground
    envs:
      - key: APP_NAME
        value: CatLab Drinks
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        type: SECRET
      - key: APP_URL
        value: ${APP_URL}
      - key: DATABASE_URL
        description: "MySQL connection URL (mysql://user:pass@host:port/dbname). Create a DigitalOcean Managed MySQL cluster and paste its connection string here."
        type: SECRET
        required: true
